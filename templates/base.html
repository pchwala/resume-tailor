<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Resume Tailor{% endblock %}</title>
    <!-- Tailwind Play CDN to start; swap to the standalone CLI build before deploy. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <nav class="border-b bg-white">
      <div class="max-w-4xl mx-auto px-4 py-3 flex gap-6 text-sm">
        <a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a>
        <a href="{% url 'applied' %}" class="hover:underline">Applied / History</a>
        <a href="{% url 'tailored' %}" class="hover:underline">Tailored</a>
      </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
